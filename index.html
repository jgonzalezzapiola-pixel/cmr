const fmt = (iso) => { if(!iso) return "—"; const [y,m,d]=iso.split("T")[0].split("-"); return `${d}/${m}/${y}`; };
const fmtTime = (iso) => {
  if(!iso) return "";
  const d=new Date(iso); const pad=n=>String(n).padStart(2,"0");
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const timeAgo = (iso) => {
  if(!iso) return "";
  const diff=Math.floor((Date.now()-new Date(iso))/86400000);
  if(diff===0) return "hoy"; if(diff===1) return "ayer";
  if(diff<7) return `hace ${diff}d`; if(diff<30) return `hace ${Math.floor(diff/7)}sem`;
  return fmt(iso);
};

function Btn({ children, onClick, variant="primary", small=false, danger=false, t, disabled=false }) {
  const [h,setH]=useState(false);
  let s;
  if(danger)                     s={ background:h?"#3a1010":"transparent", color:"#e05252", border:`1px solid #5a2020` };
  else if(variant==="primary")   s={ background:h?t.accent+"cc":t.accent, color:"#fff", border:"none" };
  else if(variant==="secondary") s={ background:"transparent", color:t.text, border:`1px solid ${t.border}` };
  else                           s={ background:"transparent", color:t.textMuted, border:"none" };
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>!disabled&&setH(true)} onMouseLeave={()=>setH(false)}
      style={{ ...s, borderRadius:10, padding:small?"8px 14px":"11px 22px",
        fontSize:small?12:14, fontFamily:"'DM Mono',monospace",
        cursor:disabled?"not-allowed":"pointer", opacity:disabled?0.4:1,
        transition:"all 0.15s", letterSpacing:"0.04em", whiteSpace:"nowrap", touchAction:"manipulation" }}>

  );
}

function FormTicket({ inicial, onSave, onCancel, t, encargados=[], clientes=[], clienteActualId=null }) {
  const [form,setForm]=useState({...inicial}); const set=k=>v=>setForm(f=>({...f,[k]:v}));
  const [ordenError, setOrdenError] = useState(null); // null | { clienteNombre, clienteId }

  const asignadoVal = form.asignado||"— Sin asignar —";

  const checkOrden = (orden) => {
    if(!orden.trim()) { setOrdenError(null); return; }
    // buscar si existe en otro cliente
    for(const c of clientes) {
      if(c.id === clienteActualId) continue; // mismo cliente, no es conflicto
      const existe = (c.tickets||[]).find(tk=>tk.orden?.trim()===orden.trim() && tk.id !== form.id);
      if(existe) { setOrdenError({ clienteNombre:c.nombre, clienteId:c.id, ticket:existe }); return; }
    }
    setOrdenError(null);
  };

  const canSave = form.titulo.trim() && form.orden?.trim() && !ordenError;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <FInput label="Titulo *" value={form.titulo} onChange={set("titulo")} placeholder="Ej: Solicita cambio de talle" t={t} span={2}/>
      <div className="form-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
          <label style={{ fontSize:10, color:t.textMuted, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>N de orden *</label>
          <input value={form.orden||""} onChange={e=>{ set("orden")(e.target.value); checkOrden(e.target.value); }}
            placeholder="12345"
            style={{ background:t.input, border:`1px solid ${ordenError?"#e05252":form.orden?.trim()?t.accent:t.inputBorder}`,
              borderRadius:9, padding:"11px 13px", fontSize:15, fontFamily:"'Lora',Georgia,serif",
              color:t.text, outline:"none", transition:"border 0.2s", width:"100%" }}/>
        </div>
        <FSel label="Tipo" value={form.tipo} onChange={set("tipo")} options={TIPOS} t={t}/>
        <FSel label="Prioridad" value={form.prioridad} onChange={set("prioridad")} options={["Alta","Media","Baja"]} t={t}/>
        <FSel label="Estado"    value={form.estado}    onChange={set("estado")}    options={ESTADOS_TICKET} t={t}/>
        <div style={{ gridColumn:"span 2", display:"flex", flexDirection:"column", gap:5 }}>
          <label style={{ fontSize:10, color:t.textMuted, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>Asignado a</label>
          <select value={asignadoVal} onChange={e=>set("asignado")(e.target.value==="— Sin asignar —"?"":e.target.value)}
            style={{ background:t.input, border:`1px solid ${t.inputBorder}`, borderRadius:9,
              padding:"11px 13px", fontSize:15, fontFamily:"'Lora',Georgia,serif",
              color:t.text, outline:"none", cursor:"pointer" }}>
            {opcionesAsignado.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      </div>

      {/* Alerta de orden duplicado */}
      {ordenError&&(
        <div style={{ background:t.isDark?"#2a1010":"#fdecea", border:"1px solid #e05252",
          borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#e05252", marginBottom:8 }}>
            ⚠️ La orden #{form.orden} ya existe en <strong>{ordenError.clienteNombre}</strong>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <button onClick={()=>onSave({...form, _adjudicarA: ordenError.clienteId})}
              style={{ background:"#e05252", color:"#fff", border:"none", borderRadius:7,
                padding:"7px 12px", fontFamily:"'DM Mono',monospace", fontSize:11, cursor:"pointer" }}>
              Adjudicar a {ordenError.clienteNombre}
            </button>
            <button onClick={()=>{ set("orden")(""); setOrdenError(null); }}
              style={{ background:"transparent", color:t.textMuted, border:`1px solid ${t.border}`,
                borderRadius:7, padding:"7px 12px", fontFamily:"'DM Mono',monospace", fontSize:11, cursor:"pointer" }}>
              Usar otro numero de orden
            </button>
          </div>
        </div>
      )}

      {!form.orden?.trim()&&(
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:"#d4b84a" }}>
          ⚠️ El numero de orden es obligatorio
        </div>
      )}

      <FTextarea label="Contexto / Problema" value={form.descripcion} onChange={set("descripcion")} rows={4} t={t} span={2}/>
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end", paddingTop:4 }}>
        <Btn variant="secondary" onClick={onCancel} t={t}>Cancelar</Btn>
        <Btn onClick={()=>canSave&&onSave(form)} t={t} disabled={!canSave}>
          {!!inicial.titulo?"Guardar cambios":"Crear ticket"}
        </Btn>
      </div>
    </div>
  );
}

function KanbanView({ clientes, onUpdateCliente, t, isAdmin, user, encargados=[] }) {
  const [editando, setEditando] = useState(null); // { ticket, clienteId }

  const allTickets = clientes.flatMap(c=>(c.tickets||[]).map(tk=>({...tk, clienteId:c.id, clienteNombre:c.nombre})));

  const cambiarEstado=(clienteId,ticketId,nuevoEstado,porEquipo=false)=>{
    const c=clientes.find(x=>x.id===clienteId); if(!c) return;
    const extra=porEquipo&&nuevoEstado==="Resuelto"?{resueltoPor:user?.email,resueltoen:nowIso()}:{};
    onUpdateCliente({...c, tickets:c.tickets.map(tk=>tk.id===ticketId?{...tk,estado:nuevoEstado,...extra}:tk)});
  };
  const addComentario=(clienteId,ticketId,texto)=>{
    const c=clientes.find(x=>x.id===clienteId); if(!c) return;
    onUpdateCliente({...c, tickets:c.tickets.map(tk=>tk.id===ticketId?{...tk,comentarios:[...(tk.comentarios||[]),{id:uid(),texto,creadoEn:nowIso()}]}:tk)});
  };
  const delTicket=(clienteId,ticketId)=>{
    if(!confirm("Eliminar este ticket?")) return;
    const c=clientes.find(x=>x.id===clienteId); if(!c) return;
    onUpdateCliente({...c, tickets:c.tickets.filter(tk=>tk.id!==ticketId)});
  };
  const saveEdit=(form)=>{
    if(!editando) return;
    const c=clientes.find(x=>x.id===editando.clienteId); if(!c) return;
    onUpdateCliente({...c, tickets:c.tickets.map(tk=>tk.id===form.id?form:tk)});
    setEditando(null);
  };

  return (
    <>
      {editando&&(
        <div style={{ position:"fixed", inset:0, background:t.modalBg, display:"flex",
          alignItems:"center", justifyContent:"center", zIndex:1000, backdropFilter:"blur(4px)" }}
          onClick={e=>e.target===e.currentTarget&&setEditando(null)}>
          <div style={{ background:t.surface, borderRadius:20, width:"100%", maxWidth:560,
            maxHeight:"90vh", overflow:"auto", boxShadow:t.shadow, border:`1px solid ${t.border}`, margin:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              padding:"16px 20px", borderBottom:`1px solid ${t.border}` }}>
              <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:16, color:t.text }}>Editar ticket</div>
              <button onClick={()=>setEditando(null)} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:t.textMuted }}>x</button>
            </div>
            <div style={{ padding:"18px 20px 32px" }}>
              <FormTicket inicial={editando.ticket} onSave={saveEdit} onCancel={()=>setEditando(null)} t={t} encargados={encargados}/>
            </div>
          </div>
        </div>
      )}
      <div className="kanban-board" style={{ display:"grid", gridTemplateColumns:"repeat(4,minmax(240px,1fr))", gap:12, overflowX:"auto", paddingBottom:8 }}>
        {ESTADOS_TICKET.map(estado=>{
          const col=allTickets.filter(tk=>tk.estado===estado);
          const cfg=t.et(estado);
          return (
            <div key={estado} style={{ display:"flex", flexDirection:"column", minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                <span>{ET[estado].icon}</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:cfg.color, textTransform:"uppercase", letterSpacing:"0.08em" }}>{estado}</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted, background:t.card, border:`1px solid ${t.border}`, borderRadius:10, padding:"0 7px", marginLeft:"auto" }}>{col.length}</span>
              </div>
              <div className="kanban-col" style={{ display:"flex", flexDirection:"column", gap:8, maxHeight:"calc(100vh - 240px)", overflowY:"auto" }}>
                {col.length===0&&<div style={{ background:t.card, border:`1px dashed ${t.border}`, borderRadius:10, padding:"20px", textAlign:"center", color:t.textMuted, fontFamily:"'DM Mono',monospace", fontSize:11 }}>Sin tickets</div>}
                {[...col].sort((a,b)=>{ const ord={Alta:0,Media:1,Baja:2}; return (ord[a.prioridad]??1)-(ord[b.prioridad]??1); })
                  .map(tk=>(
                    <TicketCard key={tk.id} ticket={tk} clienteNombre={tk.clienteNombre} showCliente={true}
                      isAdmin={isAdmin}
                      onEdit={x=>setEditando({ticket:{...x}, clienteId:tk.clienteId})}
                      onDelete={()=>delTicket(tk.clienteId,tk.id)}
                      onChangeEstado={(_,ne)=>cambiarEstado(tk.clienteId,tk.id,ne)}
                      onAddComentario={(_,txt)=>addComentario(tk.clienteId,tk.id,txt)}
                      onResolverPor={(tkId)=>cambiarEstado(tk.clienteId,tkId,"Resuelto",true)}
                      t={t}/>
                  ))}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}
function DetalleCliente({ cliente, onClose, onUpdate, onDelete, onUpdateOtherCliente, t, isAdmin, user, encargados=[], allClientes=[] }) {
  const [editCliente,setEditCliente]=useState(false);
  const [formTicket,setFormTicket]=useState(null);
  const [filtro,setFiltro]=useState("Abiertos");
  const [saving,setSaving]=useState(false);
  const tickets=cliente.tickets||[];
  const abiertos=tickets.filter(x=>x.estado!=="Resuelto"&&x.estado!=="Cancelado");
  const cBadge=t.bc(cliente.estado);
  const upd=async(patch)=>{ setSaving(true); await onUpdate({...cliente,...patch}); setSaving(false); };
  const saveTicket=async(form)=>{
    if(form._adjudicarA) {
      // adjudicar al cliente existente con ese numero de orden
      const {_adjudicarA, ...ticketLimpio} = form;
      const clienteDestino = allClientes.find(c=>c.id===_adjudicarA);
      if(clienteDestino) await onUpdateOtherCliente({...clienteDestino, tickets:[{...ticketLimpio, comentarios:ticketLimpio.comentarios||[]},...(clienteDestino.tickets||[])]});
      setFormTicket(null);
      return;
    }
    const ex=tickets.find(x=>x.id===form.id);
    await upd({tickets:ex?tickets.map(x=>x.id===form.id?form:x):[{...form,comentarios:form.comentarios||[]},...tickets]});
    setFormTicket(null);
  };
  const delTicket=async(id)=>{ if(confirm("Eliminar este ticket?")) await upd({tickets:tickets.filter(x=>x.id!==id)}); };
  const cambiarEstado=async(id,estado,porEquipo=false)=>{ const extra=porEquipo&&estado==="Resuelto"?{resueltoPor:user.email,resueltoen:nowIso()}:{}; await upd({tickets:tickets.map(x=>x.id===id?{...x,estado,...extra}:x)}); };
  const addComentario=async(ticketId,texto)=>{
    const comentario={id:uid(),texto,creadoEn:nowIso()};
    await upd({tickets:tickets.map(x=>x.id===ticketId?{...x,comentarios:[...(x.comentarios||[]),comentario]}:x)});
  };
  const FILTROS=["Abiertos","Todos","Pendiente","En proceso","Resuelto","Cancelado"];
  const ticketsFiltrados=filtro==="Abiertos"?abiertos:filtro==="Todos"?tickets:tickets.filter(x=>x.estado===filtro);
  return (
    <Modal title={editCliente?"Editar cliente":cliente.nombre}
      subtitle={!editCliente?`${cliente.email||""}${cliente.email&&cliente.telefono?" · ":""}${cliente.telefono||""}`:undefined}
      onClose={onClose} width={700} t={t}>
      {editCliente?(
        <FormCliente inicial={cliente} onSave={async f=>{await onUpdate(f);setEditCliente(false);}} onCancel={()=>setEditCliente(false)} t={t}/>
      ):(
        <>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:18, paddingBottom:16, borderBottom:`1px solid ${t.border}` }}>
            <Badge label={cliente.estado} colors={cBadge}/>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted }}>desde {fmt(cliente.creadoEn)}</span>
            {cliente.notas&&<span style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:13, color:t.textSub, width:"100%" }}>"{cliente.notas}"</span>}
            <div style={{ display:"flex", gap:6, marginLeft:"auto" }}>
              {saving&&<span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.saveColor, alignSelf:"center" }}>Guardando...</span>}
              {isAdmin&&<Btn small variant="secondary" onClick={()=>setEditCliente(true)} t={t}>✎ Editar</Btn>}
              {isAdmin&&<Btn small danger onClick={()=>{if(confirm("Eliminar cliente?")){{onDelete(cliente.id);onClose();}}}} t={t}>Eliminar</Btn>}
            </div>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:10 }}>
            <div className="filtros-tickets" style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
              {FILTROS.map(f=>{ const a=filtro===f; return (
                <button key={f} onClick={()=>setFiltro(f)} style={{
                  background:a?t.accent:"transparent", color:a?"#fff":t.textMuted,
                  border:`1px solid ${a?t.accent:t.border}`, borderRadius:6, padding:"5px 10px",
                  fontSize:11, fontFamily:"'DM Mono',monospace", cursor:"pointer" }}>
                  {f}{f==="Abiertos"&&abiertos.length>0?` (${abiertos.length})`:""}
                </button>
              );})}
            </div>
            {isAdmin&&<Btn small onClick={()=>setFormTicket(emptyTicket())} t={t}>+ Ticket</Btn>}
          </div>
          {formTicket&&(
            <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:16, marginBottom:12 }}>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:t.textMuted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>
                {tickets.find(x=>x.id===formTicket.id)?"Editar ticket":"Nuevo ticket"}
              </div>
              <FormTicket inicial={formTicket} onSave={saveTicket} onCancel={()=>setFormTicket(null)} t={t} encargados={encargados} clientes={allClientes} clienteActualId={cliente.id}/>
            </div>
          )}
          {ticketsFiltrados.length===0&&!formTicket?(
            <div style={{ textAlign:"center", padding:"32px 0", color:t.textMuted, fontStyle:"italic", fontSize:14 }}>
              {tickets.length===0?"Sin tickets — todo tranquilo":"Sin tickets con ese estado"}
            </div>
          ):(
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[...ticketsFiltrados].sort((a,b)=>{
                const ord={Alta:0,Media:1,Baja:2};
                const ca=a.estado==="Resuelto"||a.estado==="Cancelado"?1:0;
                const cb=b.estado==="Resuelto"||b.estado==="Cancelado"?1:0;
                if(ca!==cb) return ca-cb;
                return (ord[a.prioridad]??1)-(ord[b.prioridad]??1);
              }).map(ticket=>(
                <TicketCard key={ticket.id} ticket={ticket}
                  onEdit={x=>setFormTicket({...x})} onDelete={delTicket}
                  onChangeEstado={cambiarEstado} onAddComentario={addComentario}
                  isAdmin={isAdmin} onResolverPor={(tkId)=>cambiarEstado(tkId,"Resuelto",true)}
                  t={t}/>
              ))}
            </div>
          )}
        </>
      )}
    </Modal>
  );
}

// ─── Quick Ticket Modal ───────────────────────────────────────────────────────
function QuickTicketModal({ clientes, onClose, onSave, t, encargados=[] }) {
  const [step, setStep] = useState("form"); // "form" | "cliente"
  const [form, setForm] = useState(emptyTicket());
  const [search, setSearch] = useState("");
  const [clienteSel, setClienteSel] = useState(null);
  const [ordenError, setOrdenError] = useState(null);

  const checkOrden = (orden) => {
    if(!orden.trim()) { setOrdenError(null); return null; }
    for(const c of clientes) {
      const existe = (c.tickets||[]).find(tk=>tk.orden?.trim()===orden.trim() && tk.id!==form.id);
      if(existe) { setOrdenError({clienteNombre:c.nombre, clienteId:c.id}); return c; }
    }
    setOrdenError(null); return null;
  };

  const filtrados = search.trim()
    ? clientes.filter(c=>c.nombre.toLowerCase().includes(search.toLowerCase())||(c.email||"").toLowerCase().includes(search.toLowerCase()))
    : clientes;

  const handleSave = async () => {
    if(!form.titulo.trim()||!form.orden?.trim()) return;
    if(ordenError) return;
    if(!clienteSel) { setStep("cliente"); return; }
    await onSave(clienteSel, form);
    onClose();
  };

  const handleAdjudicar = async (clienteId) => {
    const c = clientes.find(x=>x.id===clienteId);
    if(!c) return;
    await onSave(c, form);
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:t.modalBg, display:"flex",
      alignItems:"flex-end", justifyContent:"center", zIndex:1000, backdropFilter:"blur(4px)" }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-inner" style={{ background:t.surface, borderRadius:"20px 20px 0 0",
        width:"100%", maxWidth:600, maxHeight:"93vh", overflow:"auto",
        boxShadow:t.shadow, border:`1px solid ${t.border}`, margin:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"18px 20px 14px", borderBottom:`1px solid ${t.border}`,
          position:"sticky", top:0, background:t.surface, zIndex:1 }}>
          <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:18, color:t.text }}>
            {step==="form"?"Nuevo ticket rapido":"Elegir cliente"}
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:t.textMuted }}>x</button>
        </div>
        <div style={{ padding:"18px 20px 32px" }}>
          {step==="form"&&(
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {/* orden primero - es lo mas importante */}
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <label style={{ fontSize:10, color:t.textMuted, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>N de orden *</label>
                <input value={form.orden||""} autoFocus
                  onChange={e=>{ setForm(f=>({...f,orden:e.target.value})); checkOrden(e.target.value); }}
                  placeholder="12345"
                  style={{ background:t.input, border:`1px solid ${ordenError?"#e05252":form.orden?.trim()?t.accent:t.inputBorder}`,
                    borderRadius:9, padding:"13px 14px", fontSize:16, fontFamily:"'Lora',serif",
                    color:t.text, outline:"none", transition:"border 0.2s" }}/>
              </div>

              {ordenError&&(
                <div style={{ background:t.isDark?"#2a1010":"#fdecea", border:"1px solid #e05252", borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#e05252", marginBottom:8 }}>
                    ⚠️ La orden #{form.orden} ya existe en <strong>{ordenError.clienteNombre}</strong>
                  </div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <button onClick={()=>handleAdjudicar(ordenError.clienteId)}
                      style={{ background:"#c45c2e", color:"#fff", border:"none", borderRadius:7,
                        padding:"8px 14px", fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer" }}>
                      Adjudicar a {ordenError.clienteNombre}
                    </button>
                    <button onClick={()=>{ setForm(f=>({...f,orden:""})); setOrdenError(null); }}
                      style={{ background:"transparent", color:t.textMuted, border:`1px solid ${t.border}`,
                        borderRadius:7, padding:"8px 14px", fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer" }}>
                      Usar otro numero
                    </button>
                  </div>
                </div>
              )}

              <FInput label="Titulo *" value={form.titulo} onChange={v=>setForm(f=>({...f,titulo:v}))} placeholder="Ej: Solicita cambio de talle" t={t}/>
              <div className="form-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <FSel label="Tipo"      value={form.tipo}      onChange={v=>setForm(f=>({...f,tipo:v}))}      options={TIPOS} t={t}/>
                <FSel label="Prioridad" value={form.prioridad} onChange={v=>setForm(f=>({...f,prioridad:v}))} options={["Alta","Media","Baja"]} t={t}/>
                <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                  <label style={{ fontSize:10, color:t.textMuted, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>Asignado a</label>
                  <select value={form.asignado||"— Sin asignar —"} onChange={e=>setForm(f=>({...f,asignado:e.target.value==="— Sin asignar —"?"":e.target.value}))}
                    style={{ background:t.input, border:`1px solid ${t.inputBorder}`, borderRadius:9,
                      padding:"11px 13px", fontSize:14, fontFamily:"'Lora',serif", color:t.text, outline:"none" }}>
                    {["— Sin asignar —",...encargados.map(e=>e.nombre),"Otro"].map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
                <FSel label="Estado" value={form.estado} onChange={v=>setForm(f=>({...f,estado:v}))} options={ESTADOS_TICKET} t={t}/>
              </div>
              <FTextarea label="Contexto / Problema" value={form.descripcion} onChange={v=>setForm(f=>({...f,descripcion:v}))} rows={3} t={t}/>
              {clienteSel&&(
                <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:10, padding:"10px 14px",
                  display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:t.text }}>
                    Cliente: <strong>{clienteSel.nombre}</strong>
                  </div>
                  <button onClick={()=>setClienteSel(null)} style={{ background:"none", border:"none", cursor:"pointer", color:t.textMuted, fontSize:14 }}>x</button>
                </div>
              )}
              <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                <Btn variant="secondary" onClick={onClose} t={t}>Cancelar</Btn>
                {!clienteSel
                  ?<Btn onClick={()=>{ if(form.titulo.trim()&&form.orden?.trim()&&!ordenError) setStep("cliente"); }} t={t} disabled={!form.titulo.trim()||!form.orden?.trim()||!!ordenError}>
                    Elegir cliente →
                  </Btn>
                  :<Btn onClick={handleSave} t={t} disabled={!form.titulo.trim()||!form.orden?.trim()||!!ordenError}>
                    Crear ticket
                  </Btn>
                }
              </div>
            </div>
          )}

          {step==="cliente"&&(
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} autoFocus
                placeholder="Buscar cliente..."
                style={{ background:t.input, border:`1px solid ${t.inputBorder}`, borderRadius:10,
                  padding:"11px 14px", fontSize:15, fontFamily:"'Lora',serif", color:t.text, outline:"none" }}
                onFocus={e=>e.target.style.borderColor=t.accent}
                onBlur={e=>e.target.style.borderColor=t.inputBorder}/>
              <div style={{ display:"flex", flexDirection:"column", gap:4, maxHeight:320, overflowY:"auto" }}>
                {filtrados.length===0&&<div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:t.textMuted, textAlign:"center", padding:20 }}>Sin resultados</div>}
                {filtrados.map(c=>(
                  <button key={c.id} onClick={()=>{ setClienteSel(c); setStep("form"); }}
                    style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:10,
                      padding:"12px 16px", cursor:"pointer", textAlign:"left", transition:"background 0.12s" }}
                    onMouseEnter={e=>e.currentTarget.style.background=t.cardHover}
                    onMouseLeave={e=>e.currentTarget.style.background=t.card}>
                    <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:15, color:t.text }}>{c.nombre}</div>
                    <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted, marginTop:2 }}>{c.email||""}</div>
                  </button>
                ))}
              </div>
              <button onClick={()=>setStep("form")}
                style={{ background:"none", border:"none", fontFamily:"'DM Mono',monospace", fontSize:12, color:t.textMuted, cursor:"pointer", textAlign:"left" }}>
                ← Volver
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main CRM ─────────────────────────────────────────────────────────────────
function CRM({ user, onLogout }) {
  const isAdmin = user.email === ADMIN_EMAIL;
  const [isDark,setIsDark]=useState(true);
  const [encargados,setEncargados]=useState([]);  // for ticket assignment dropdown
  const [clientes,setClientes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  const [search,setSearch]=useState("");
  const [filtroEstado,setFiltroEstado]=useState("Todos");
  const [filtroTickets,setFiltroTickets]=useState("Todos");
  const [vista,setVista]=useState("lista");
  const [nuevoModal,setNuevoModal]=useState(false);
  const [quickTicket,setQuickTicket]=useState(false);
  const [clienteSel,setClienteSel]=useState(null);
  const [saveMsg,setSaveMsg]=useState("");
  const [menuOpen,setMenuOpen]=useState(false);
  const [toasts,setToasts]=useState([]);
  const menuRef=useRef(null);

  const t=isDark?DARK:LIGHT;
  useEffect(()=>{ document.body.style.background=t.bg; },[t.bg]);

  useEffect(()=>{
    const fn=e=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener("mousedown",fn); return()=>document.removeEventListener("mousedown",fn);
  },[]);

  useEffect(()=>{
    (async()=>{
      try {
        const [data, encData] = await Promise.all([
          dbLoadAll(),
          supabase.from("encargados_extras").select("*").order("nombre")
        ]);
        setClientes(data);
        if(encData.data) setEncargados(encData.data);
        const theme=localStorage.getItem(THEME_KEY);
        const savedView=localStorage.getItem(VIEW_KEY);
        if(theme) setIsDark(theme==="dark");
        if(savedView) setVista(savedView);
      } catch(e){ setDbError("No se pudo cargar los datos."); }
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{
    const channel = supabase.channel("crm-realtime")
      .on("postgres_changes",{ event:"INSERT", schema:"public", table:"clientes" },payload=>{
        const nuevo={...payload.new.data, id:payload.new.id};
        setClientes(p=>{ if(p.find(c=>c.id===nuevo.id)) return p; return [nuevo,...p]; });
        const tk=(nuevo.tickets||[])[0];
        if(tk&&tk.origenCliente) addToast("Nuevo ticket de "+nuevo.nombre+" (desde formulario)");
      })
      .on("postgres_changes",{ event:"UPDATE", schema:"public", table:"clientes" },payload=>{
        const actualizado={...payload.new.data, id:payload.new.id};
        setClientes(p=>p.map(c=>c.id===actualizado.id?actualizado:c));
        const idsViejos=new Set((payload.old?.data?.tickets||[]).map(tk=>tk.id));
        const tkNuevo=(actualizado.tickets||[]).find(tk=>!idsViejos.has(tk.id)&&tk.origenCliente);
        if(tkNuevo) addToast("Nuevo ticket de "+actualizado.nombre+" (desde formulario)");
      })
      .subscribe();
    return()=>supabase.removeChannel(channel);
  },[]);

  const addToast=(msg)=>{ const id=uid(); setToasts(p=>[...p,{id,msg}]); setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),6000); };
  const dismissToast=(id)=>setToasts(p=>p.filter(x=>x.id!==id));
  const toggleTheme=()=>{ const n=!isDark; setIsDark(n); localStorage.setItem(THEME_KEY,n?"dark":"light"); };
  const cambiarVista=(v)=>{ setVista(v); localStorage.setItem(VIEW_KEY,v); };
  const showSave=(ok)=>{ setSaveMsg(ok?"Guardado":"Error"); setTimeout(()=>setSaveMsg(""),2200); };

  const agregarCliente   =async(form)=>{ try{ await dbUpsert(form); setClientes(p=>[form,...p]); setNuevoModal(false); showSave(true); }catch(e){ showSave(false); } };
  const actualizarCliente=async(form)=>{ try{ await dbUpsert(form); setClientes(p=>p.map(c=>c.id===form.id?form:c)); setClienteSel(prev=>prev?.id===form.id?form:prev); showSave(true); }catch(e){ showSave(false); } };
  const eliminarCliente  =async(id)=>  { try{ await dbDelete(id);   setClientes(p=>p.filter(c=>c.id!==id)); showSave(true); }catch(e){ showSave(false); } };

  const filtrados=clientes.filter(c=>{
    const q=search.toLowerCase();
    const tieneRef=q.length>=3&&(c.tickets||[]).some(tk=>tk.id.toLowerCase().includes(q)||(tk.orden||"").toLowerCase().includes(q));
    const ms=!q||c.nombre.toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q)||(c.telefono||"").includes(q)||tieneRef;
    const me=filtroEstado==="Todos"||c.estado===filtroEstado;
    const ab=(c.tickets||[]).filter(x=>x.estado!=="Resuelto"&&x.estado!=="Cancelado");
    const mt=filtroTickets==="Todos"||(filtroTickets==="Con tickets"&&ab.length>0)||(filtroTickets==="Sin tickets"&&ab.length===0);
    return ms&&me&&mt;
  });

  const totalClientes   =clientes.length;
  const ticketsAbiertos =clientes.reduce((s,c)=>s+(c.tickets||[]).filter(x=>x.estado!=="Resuelto"&&x.estado!=="Cancelado").length,0);
  const ticketsAlta     =clientes.reduce((s,c)=>s+(c.tickets||[]).filter(x=>x.prioridad==="Alta"&&x.estado!=="Resuelto"&&x.estado!=="Cancelado").length,0);
  const resueltos       =clientes.reduce((s,c)=>s+(c.tickets||[]).filter(x=>x.estado==="Resuelto").length,0);

  if(loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:DARK.bg, fontFamily:"'Lora',serif", fontStyle:"italic", color:"#555", flexDirection:"column", gap:12 }}>
      <div style={{ fontSize:32, opacity:0.2 }}>🏔</div>Cargando...
    </div>
  );
  if(dbError) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:DARK.bg, fontFamily:"'Lora',serif", color:"#e05252", flexDirection:"column", gap:10, padding:24, textAlign:"center" }}>
      <div>⚠️</div><div>{dbError}</div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:t.bg, transition:"background 0.25s", display:"flex", flexDirection:"column" }}>

      {/* Header */}
      <header className="header-inner" style={{ background:t.header, height:58, padding:"0 20px",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        borderBottom:`2px solid ${t.accent}`, position:"sticky", top:0, zIndex:200,
        boxShadow:"0 2px 32px rgba(0,0,0,0.5)", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:10 }}>
          <span style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:22, letterSpacing:"-0.5px", color:"#f0ece4" }}>Siete Cumbres</span>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:t.accent, letterSpacing:"0.2em", textTransform:"uppercase", opacity:0.9 }}>POSVENTA</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {saveMsg&&<span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:saveMsg==="Error"?"#e05252":t.saveColor }}>✓ {saveMsg}</span>}
          <button onClick={toggleTheme} style={{ background:isDark?"#1e1e1e":"#e0d4be", border:`1px solid ${t.border}`,
            borderRadius:8, width:34, height:34, cursor:"pointer", fontSize:15,
            display:"flex", alignItems:"center", justifyContent:"center" }}>
            {isDark?"☀️":"🌙"}
          </button>
          <div ref={menuRef} style={{ position:"relative" }}>
            <button onClick={()=>setMenuOpen(o=>!o)}
              style={{ background:isDark?"#1e1e1e":"#e0d4be", border:`1px solid ${t.border}`,
                borderRadius:8, width:34, height:34, cursor:"pointer", fontSize:15,
                display:"flex", alignItems:"center", justifyContent:"center" }}>👤</button>
            {menuOpen&&(
              <div style={{ position:"absolute", top:"calc(100% + 6px)", right:0, background:t.card,
                border:`1px solid ${t.border}`, borderRadius:12, overflow:"hidden",
                minWidth:210, maxWidth:"calc(100vw - 28px)", boxShadow:t.shadow, zIndex:300 }}>
                <div style={{ padding:"12px 16px", borderBottom:`1px solid ${t.border}` }}>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:t.textMuted }}>Sesion como</div>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:t.text, marginTop:2, wordBreak:"break-all" }}>{user.email}</div>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, marginTop:4, padding:"2px 8px", borderRadius:6, display:"inline-block", background:isAdmin?"#2a1e08":"#0e2030", color:isAdmin?"#f0b840":"#5a9ed4", border:`1px solid ${isAdmin?"#4a3010":"#1a4060"}` }}>{isAdmin?"Admin":"Equipo"}</div>
                </div>
                <button onClick={()=>{ setMenuOpen(false); onLogout(); }}
                  style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"transparent",
                    border:"none", padding:"13px 16px", cursor:"pointer", fontFamily:"'DM Mono',monospace",
                    fontSize:13, color:"#e05252" }}
                  onMouseEnter={e=>e.currentTarget.style.background=t.surface}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  🚪 Cerrar sesion
                </button>
              </div>
            )}
          </div>
          <button onClick={()=>setQuickTicket(true)}
            style={{ background:t.isDark?"#1a2a1a":"#e6f7ef", color:"#5fc48a",
              border:"1px solid #1a4a2a", borderRadius:8,
              padding:"7px 14px", fontSize:13, fontFamily:"'DM Mono',monospace", cursor:"pointer", letterSpacing:"0.04em",
              touchAction:"manipulation" }}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.82"}
            onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            + Ticket
          </button>
          {isAdmin&&<button onClick={()=>setNuevoModal(true)}
            style={{ background:t.accent, color:"#fff", border:"none", borderRadius:8,
              padding:"7px 14px", fontSize:13, fontFamily:"'DM Mono',monospace", cursor:"pointer", letterSpacing:"0.04em",
              touchAction:"manipulation" }}
            onMouseEnter={e=>e.target.style.opacity="0.82"}
            onMouseLeave={e=>e.target.style.opacity="1"}>
            + Cliente
          </button>}
        </div>
      </header>

      <div style={{ flex:1, overflowY:"auto" }}>
        <main className="main-pad" style={{ maxWidth:1100, margin:"0 auto", padding:"20px 20px" }}>

            {/* Banner equipo */}
            {!isAdmin&&(
              <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:14,
                padding:"14px 18px", marginBottom:18, display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:38, height:38, borderRadius:"50%", background:t.isDark?"#1a2a3a":"#e8f0fc",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>👋</div>
                <div>
                  <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:16, color:t.text }}>
                    Hola, {user.email.split("@")[0]}
                  </div>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted, marginTop:2 }}>
                    Equipo Siete Cumbres
                  </div>
                </div>
              </div>
            )}
            {/* Stats */}
            <div className="stats-grid" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:22 }}>
              {[
                { label:"Clientes",      val:totalClientes,    icon:"👥" },
                { label:"Abiertos",      val:ticketsAbiertos,  icon:"📬", hi:ticketsAbiertos>0 },
                { label:"Alta prior.",   val:ticketsAlta,      icon:"🔴", urgente:ticketsAlta>0 },
                { label:"Resueltos",     val:resueltos,        icon:"✅", good:resueltos>0 },
              ].map(({label,val,icon,hi,urgente,good})=>(
                <div key={label} style={{ background:t.card, borderRadius:14, padding:"16px 18px",
                  border:`1px solid ${urgente&&val>0?"#5a2020":hi&&val>0?"#484410":t.border}`,
                  boxShadow:urgente&&val>0?"0 0 20px rgba(224,82,82,0.1)":hi&&val>0?"0 0 20px rgba(212,184,74,0.08)":"none" }}>
                  <div className="stat-val" style={{ fontSize:36, fontStyle:"italic", lineHeight:1, fontWeight:600,
                    color:urgente&&val>0?"#e05252":hi&&val>0?"#d4b84a":good&&val>0?"#5fc48a":t.text }}>{val}</div>
                  <div className="stat-label" style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:t.textMuted,
                    textTransform:"uppercase", letterSpacing:"0.1em", marginTop:6 }}>{label}</div>
                </div>
              ))}
            </div>

            {/* Tabs + filtros */}
            <div className="filters-wrap" style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap", alignItems:"center" }}>
              <div style={{ display:"flex", gap:4, background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:4, flexShrink:0 }}>
                {[{id:"lista",icon:"☰",label:"Lista"},{id:"kanban",icon:"⊞",label:"Kanban"}].map(v=>{
                  const a=vista===v.id;
                  return (
                    <button key={v.id} onClick={()=>cambiarVista(v.id)} style={{
                      background:a?t.accent:"transparent", color:a?"#fff":t.textMuted,
                      border:"none", borderRadius:8, padding:"8px 16px",
                      fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer",
                      transition:"all 0.15s", display:"flex", alignItems:"center", gap:5,
                      touchAction:"manipulation" }}>
                      {v.icon} {v.label}
                    </button>
                  );
                })}
              </div>
              {vista==="lista"&&(
                <>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Buscar por nombre, email o ref..."
                    className="search-input"
                    style={{ flex:1, minWidth:180, background:t.input, border:`1px solid ${t.inputBorder}`,
                      borderRadius:10, padding:"10px 14px", fontSize:15, fontFamily:"'Lora',serif",
                      color:t.text, outline:"none" }}
                    onFocus={e=>e.target.style.borderColor=t.accent}
                    onBlur={e=>e.target.style.borderColor=t.inputBorder}/>
                  <div className="filter-group" style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                    {["Todos",...ESTADOS_CLIENTE].map(e=>{ const a=filtroEstado===e; return (
                      <button key={e} onClick={()=>setFiltroEstado(e)} style={{
                        background:a?t.text:"transparent", color:a?(isDark?"#0b0b0b":"#f4ece0"):t.textMuted,
                        border:`1px solid ${a?t.text:t.border}`, borderRadius:8, padding:"8px 13px",
                        fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer",
                        touchAction:"manipulation", transition:"all 0.15s" }}>{e}</button>
                    );})}
                  </div>
                  <div className="filter-group" style={{ display:"flex", gap:5 }}>
                    {["Todos","Con tickets","Sin tickets"].map(f=>{ const a=filtroTickets===f; return (
                      <button key={f} onClick={()=>setFiltroTickets(f)} style={{
                        background:a?t.accent+"22":"transparent", color:a?t.accent:t.textMuted,
                        border:`1px solid ${a?t.accent:t.border}`, borderRadius:8, padding:"8px 13px",
                        fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer",
                        touchAction:"manipulation", transition:"all 0.15s" }}>{f}</button>
                    );})}
                  </div>
                </>
              )}
            </div>

            {vista==="kanban"&&<KanbanView clientes={clientes} onUpdateCliente={actualizarCliente} t={t} isAdmin={isAdmin} user={user} encargados={encargados}/>}

            {vista==="lista"&&(
              filtrados.length===0?(
                <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:14,
                  padding:"60px 20px", textAlign:"center" }}>
                  <div style={{ fontSize:36, marginBottom:12, opacity:0.3 }}>🏔</div>
                  <div style={{ color:t.textMuted, fontStyle:"italic", fontSize:16 }}>
                    {clientes.length===0?"Agrega tu primer cliente →":"Sin resultados para esa busqueda"}
                  </div>
                </div>
              ):(
                <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:14, overflow:"hidden" }}>
                  <div className="table-head" style={{ display:"grid", gridTemplateColumns:"2fr 1.4fr 1fr 1fr 1fr 28px",
                    padding:"11px 20px", borderBottom:`1px solid ${t.border}`, background:t.tableHead }}>
                    {["Cliente","Contacto","Estado","Tickets","Prioridad",""].map((h,i)=>(
                      <div key={i} style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:t.textMuted,
                        textTransform:"uppercase", letterSpacing:"0.1em" }}>{h}</div>
                    ))}
                  </div>
                  {filtrados.map((c,i)=>{
                    const tks=c.tickets||[];
                    const abiertos=tks.filter(x=>x.estado!=="Resuelto"&&x.estado!=="Cancelado");
                    const hasAlta=abiertos.some(x=>x.prioridad==="Alta");
                    const hasMed=abiertos.some(x=>x.prioridad==="Media");
                    const maxPr=hasAlta?"Alta":hasMed?"Media":abiertos.length>0?"Baja":null;
                    const cBadge=t.bc(c.estado);
                    const tieneOrigenCliente=abiertos.some(x=>x.origenCliente);
                    return (
                      <div key={c.id} onClick={()=>setClienteSel(c)}
                        className="table-row"
                        style={{ display:"grid", gridTemplateColumns:"2fr 1.4fr 1fr 1fr 1fr 28px",
                          padding:"15px 20px", alignItems:"center",
                          borderBottom:i<filtrados.length-1?`1px solid ${t.borderFaint}`:"none",
                          cursor:"pointer", transition:"background 0.15s" }}
                        onMouseEnter={e=>e.currentTarget.style.background=t.cardHover}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                            <span className="row-name" style={{ fontSize:16, fontStyle:"italic", color:t.text, lineHeight:1.2 }}>{c.nombre}</span>
                            {tieneOrigenCliente&&(
                              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:"#5a9ed4",
                                background:t.isDark?"#0e2030":"#e8f0fc", border:`1px solid ${t.isDark?"#1a4060":"#b8cef7"}`,
                                borderRadius:4, padding:"2px 6px", flexShrink:0 }}>nuevo</span>
                            )}
                          </div>
                          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted }}>
                            {abiertos.length>0
                              ?<span style={{ color:hasAlta?"#e05252":"#d4b84a" }}>{abiertos.length} abierto{abiertos.length>1?"s":""}</span>
                              :<span style={{ color:"#5fc48a" }}>al dia</span>}
                          </div>
                        </div>
                        <div className="col-contacto" style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:t.textSub, lineHeight:1.5 }}>
                          <div style={{ marginBottom:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.email||"—"}</div>
                          <div>{c.telefono||""}</div>
                        </div>
                        <div><Badge label={c.estado} colors={cBadge}/></div>
                        <div className="col-tickets-count">
                          {abiertos.length===0
                            ?<span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#5fc48a" }}>al dia</span>
                            :<span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:hasAlta?"#e05252":"#d4b84a" }}>
                              {abiertos.length} abierto{abiertos.length>1?"s":""}
                            </span>}
                        </div>
                        <div className="col-prioridad">
                          {maxPr?<PriorityPill value={maxPr} t={t}/>
                            :<span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted }}>—</span>}
                        </div>
                        <div style={{ color:t.accent, fontSize:20, textAlign:"center" }}>›</div>
                      </div>
                    );
                  })}
                </div>
              )
            )}

            <div style={{ textAlign:"right", fontFamily:"'DM Mono',monospace", fontSize:10, color:t.textMuted, marginTop:12 }}>
              {vista==="lista"?`${filtrados.length} de ${clientes.length} clientes`:`${clientes.reduce((s,c)=>s+(c.tickets||[]).length,0)} tickets`} · ☁ Nube
            </div>
          </main>
        </div>

      {nuevoModal&&(
        <Modal title="Nuevo cliente" onClose={()=>setNuevoModal(false)} t={t}>
          <FormCliente inicial={emptyCliente()} onSave={agregarCliente} onCancel={()=>setNuevoModal(false)} t={t}/>
        </Modal>
      )}
      {quickTicket&&(
        <QuickTicketModal
          clientes={clientes}
          encargados={encargados}
          t={t}
          onClose={()=>setQuickTicket(false)}
          onSave={async(cliente, ticket)=>{
            const ticketFinal={...ticket, comentarios:ticket.comentarios||[]};
            await actualizarCliente({...cliente, tickets:[ticketFinal,...(cliente.tickets||[])]});
          }}/>
      )}
      {clienteSel&&(
        <DetalleCliente
          cliente={clientes.find(c=>c.id===clienteSel.id)||clienteSel}
          onClose={()=>setClienteSel(null)}
          onUpdate={actualizarCliente}
          onDelete={eliminarCliente}
          onUpdateOtherCliente={actualizarCliente}
          isAdmin={isAdmin}
          user={user}
          encargados={encargados}
          allClientes={clientes}
          t={t}/>
      )}
      <ToastStack toasts={toasts} onDismiss={dismissToast}/>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{ setUser(session?.user||null); setChecking(false); });
    const { data:{subscription} }=supabase.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);
  const logout=async()=>await supabase.auth.signOut();
  if(checking) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#0b0b0b" }}>
      <div style={{ fontSize:32, opacity:0.15 }}>🏔</div>
    </div>
  );
  if(!user) return <Login/>;
  return <CRM user={user} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
